<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0a1015" stroke="#1a2832" stroke-width="1"/>
  <!-- Spider web pattern -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#1a2832" stroke-width="1"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#1a2832" stroke-width="1"/>
  <circle cx="32" cy="32" r="8" fill="none" stroke="#1a2832" stroke-width="1"/>
  <!-- Web spokes -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#1a2832" stroke-width="1"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="#1a2832" stroke-width="1"/>
  <line x1="18" y1="18" x2="46" y2="46" stroke="#1a2832" stroke-width="1"/>
  <line x1="46" y1="18" x2="18" y2="46" stroke="#1a2832" stroke-width="1"/>
  <!-- Crawler bot (simplified spider) -->
  <ellipse cx="32" cy="32" rx="6" ry="5" fill="url(#cyan)"/>
  <circle cx="30" cy="31" r="1.5" fill="#0a1015"/>
  <circle cx="34" cy="31" r="1.5" fill="#0a1015"/>
  <!-- Antenna -->
  <line x1="32" y1="27" x2="32" y2="22" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="21" r="2" fill="#22d3ee"/>
  <!-- Legs -->
  <path d="M26 32 Q22 30 18 26" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M26 33 Q21 34 17 36" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M38 32 Q42 30 46 26" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M38 33 Q43 34 47 36" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
